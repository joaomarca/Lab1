name: CI - Validação de Código e Testes

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop

jobs:
  validacao_e_testes:
    name: Compilação e Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar o Java21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar Testes Unitários
        run: mvn clean test

      - name: Garantir que compila (Build)
        run: mvn clean package -DskipTests